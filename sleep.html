        background-repeat: no-repeat;
        font-family: sans-serif;
        background-size: cover;
        color: rgba(255, 255, 255, 0.445);
        font-size: large;
        font-weight: 200;
    }
    clock {
        background-color: rgba(255, 255, 255, 0.658);
        display: block;
        box-shadow: 10px;
        color: rgb(0, 0, 0);
        font-size: xx-large;
        size: 400px;
        padding: 20px;
    }
    topbar {
        display: block;
        width: 100%;
        position:fixed;
        background-color: rgba(255, 255, 255, 0.432);
    }
    b {
        display: contents;
    }
    bottom {
        border:black thin solid;
        background-color: white;
        bottom: 10%;
        position: fixed;
        padding: 10px;
        left: 50%;
    }
    iframe {
        border: 0px solid black;
        position: fixed;
        z-index: 100;
    }
    details {
        bottom: 10px;
        left: 50%;
    }
    button {
        position: fixed;
        bottom: 1px;
        width: 100%;
        background-color: rgba(255, 255, 255, 0.555);
        border-radius: 0px;
        padding: 10px;
        text-align: center;
        border-style: solid;
        border: 0px;
    }
    button:active {
        transition: padding 0.3s ease;
        padding: 8px;
    }
    notification {
        display: grid;
        padding: 10px;
        background-color: rgba(255, 255, 255, 0.884);
    }
    sleep {
        position: fixed;
        display: inline-block;
        width: 100%;
        height: 100%;
        background-color: rgb(0, 0, 0);
    }
</style>
<h1><span id="clock">00:00</span></h1><span id="date">Date Loading...</span>
<a href="lock.html"><sleep> </sleep></a>
<script>
  function updateClock() {
    const now = new Date();
    // This gets the hours and minutes and makes sure they stay 2 digits (like 09:05)
    const timeString = now.getHours().toString().padStart(2, '0') + ":" + 
                       now.getMinutes().toString().padStart(2, '0');
    
    document.getElementById('clock').textContent = timeString;
    // Inside the script you already have:
    const dateString = now.toLocaleDateString(); // Gets the date based on user settings
    document.getElementById('date').textContent = dateString;
  }

  // Run it once right now
  updateClock();
  // Then tell the phone to check the time every 1 second
  setInterval(updateClock, 1000);
</script>
